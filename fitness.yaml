apiVersion: apps/v1
kind: Deployment
metadata:
  name: fitness
  namespace: prod
  labels:
    env: prod
    app: fitness
spec:
  replicas: 3
  selector:
    matchLabels:
      env: prod
      app: fitness
  template:
    metadata:
      name: fitness
      namespace: prod
      labels:
        env: prod
        app: fitness
    spec:
      containers:
      - name: fitnesscontainer
        image: malikhussain/fitness:v300
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: fitnessvc
  namespace: prod
spec:
  selector:
    env: prod
  ports:
    - port: 80
  type: NodePort

    
